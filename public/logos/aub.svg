<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White background -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#7B1D3A" stroke-width="3"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#7B1D3A" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M100 38 L140 55 L140 105 Q140 135 100 155 Q60 135 60 105 L60 55 Z" fill="#7B1D3A"/>
  <!-- Shield inner highlight -->
  <path d="M100 48 L133 63 L133 106 Q133 130 100 147 Q67 130 67 106 L67 63 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- AUB text on shield -->
  <text x="100" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">AUB</text>
  <!-- Founding year -->
  <text x="100" y="128" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">1866</text>

  <!-- Top arc text: AMERICAN UNIVERSITY -->
  <path id="topArc" d="M 22,100 A 78,78 0 0,1 178,100" fill="none"/>
  <text font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#7B1D3A" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">AMERICAN UNIVERSITY</textPath>
  </text>

  <!-- Bottom arc text: OF BEIRUT -->
  <path id="botArc" d="M 26,108 A 74,74 0 0,0 174,108" fill="none"/>
  <text font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#7B1D3A" letter-spacing="1.5">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">OF BEIRUT · LEBANON</textPath>
  </text>
</svg>
